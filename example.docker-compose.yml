services:

  # ── Local AI stack ──────────────────────────────────────────────────

  ollama:
    image: ollama/ollama
    container_name: ollama
    runtime: nvidia            # remove this line if you have no GPU
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: open-webui
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "3000:8080"
    restart: unless-stopped

  # ── GitLab (remove this entire block if using a remote GitLab) ──────

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: always
    hostname: localhost
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
    ports:
      - "80:80"
      - "443:443"
      - "2222:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    shm_size: '256m'

  # ── GitLab RAG sync ─────────────────────────────────────────────────
  #
  # GITLAB_URL explained:
  #   - If GitLab is running in Docker on the same compose file:
  #       Use the container name as the hostname: http://gitlab
  #       Docker's internal networking resolves container names automatically.
  #
  #   - If GitLab is running on a remote server:
  #       Use the actual IP or hostname with the port GitLab is running on.
  #       Examples:
  #         http://192.168.1.100:80
  #         http://gitlab.company.com:8929
  #         https://gitlab.company.com
  #       If GitLab is on the default port (80 for http, 443 for https), the port can be omitted.
  #
  # OPENWEBUI_URL:
  #   Always http://open-webui:8080 — this is the internal Docker port for OpenWebUI.
  #   It does not change regardless of what port OpenWebUI is mapped to on the host.
  #
  # Multiple repos:
  #   Just list them in GITLAB_PROJECT_IDS in .env (comma-separated).
  #   No additional service blocks needed.
  # ────────────────────────────────────────────────────────────────────

  # Local GitLab in Docker
  gitlab-rag-sync:
    build: gitlab-rag
    container_name: gitlab-rag-sync
    restart: always
    depends_on:
      open-webui:
        condition: service_healthy
      gitlab:
        condition: service_healthy
    env_file:
      - gitlab-rag/.env
    environment:
      GITLAB_URL: "http://gitlab"        # container name — Docker resolves this internally
      OPENWEBUI_URL: "http://open-webui:8080"
      SYNC_INTERVAL: "3600"

  # Remote GitLab (uncomment to use, and remove the gitlab service block above)
  # gitlab-rag-sync:
  #   build: gitlab-rag
  #   container_name: gitlab-rag-sync
  #   restart: always
  #   depends_on:
  #     open-webui:
  #       condition: service_healthy     # no gitlab depends_on — it's not a local container
  #   env_file:
  #     - gitlab-rag/.env
  #   environment:
  #     GITLAB_URL: "http://your-gitlab-host:port"   # real hostname/IP and port
  #     OPENWEBUI_URL: "http://open-webui:8080"
  #     SYNC_INTERVAL: "3600"

volumes:
  ollama_data:
  open_webui_data:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
